<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Font Duel</title>
    <style>
        /* Design Tokens - Warm, Editorial, Alpine Aesthetic */
        :root {
            /* Neutrals (Warm, organic linen & stone) */
            --color-neutral-50:  #FAF8F5;
            --color-neutral-100: #F3EFEA;
            --color-neutral-200: #EAE4DA;
            --color-neutral-300: #DCD4C7;
            --color-neutral-400: #B8AC9D;
            --color-neutral-600: #8C7E72;
            --color-neutral-800: #51463E;
            --color-neutral-900: #2D2825;

            /* Accents (Alpine & Sunset tones) */
            --color-accent-terracotta:       #D78A7A;
            --color-accent-terracotta-light: #F5D6D0;
            --color-accent-glacier:          #7E9688;
            --color-accent-glacier-light:    #C4D3CB;
            --color-accent-ochre:            #A78D73;
            --color-accent-slate:            #4A3E36;

            /* Semantic Colors */
            --bg-primary:    var(--color-neutral-100);
            --bg-secondary:  var(--color-neutral-200);
            --bg-card:       rgba(250, 248, 245, 0.75);
            
            --text-primary:   var(--color-neutral-900);
            --text-secondary: var(--color-neutral-600);
            --text-muted:     var(--color-neutral-400);
            --text-accent:    var(--color-accent-terracotta);

            --border-light:  rgba(255, 255, 255, 0.4);
            --border-medium: var(--color-neutral-300);
            --border-dark:   var(--color-neutral-800);

            /* Typography */
            --font-sans:  "Libertinus Sans", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;

            --font-size-xs:   0.8rem;
            --font-size-sm:   0.875rem;
            --font-size-base: 1rem;
            --font-size-md:   1.25rem;
            --font-size-lg:   1.563rem;
            --font-size-xl:   1.953rem;
            --font-size-2xl:  2.441rem;

            --font-weight-light:  300;
            --font-weight-normal: 400;
            --font-weight-medium: 500;
            --font-weight-bold:   700;

            --line-height-tight:  1.2;
            --line-height-normal: 1.5;
            --line-height-relaxed: 1.75;

            --letter-spacing-tight:  -0.02em;
            --letter-spacing-normal: 0;
            --letter-spacing-wide:   0.05em;

            /* Spacing */
            --spacing-xs:  0.25rem;
            --spacing-sm:  0.5rem;
            --spacing-md:  1rem;
            --spacing-lg:  1.5rem;
            --spacing-xl:  2rem;
            --spacing-2xl: 3rem;

            /* Borders & Effects */
            --radius-sm:   2px;
            --radius-md:   4px;
            --radius-lg:   8px;
            --radius-full: 9999px;

            /* Glassmorphism / Translucency */
            --blur-card: blur(12px);
            --shadow-card: 0 10px 30px -10px rgba(81, 70, 62, 0.15), 
                           0 1px 3px rgba(81, 70, 62, 0.05);

            /* Transitions */
            --transition-fast:   0.15s ease;
            --transition-normal: 0.3s ease;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-sans);
            font-size: var(--font-size-base);
            line-height: var(--line-height-normal);
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        #app {
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            padding: var(--spacing-xl);
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: var(--spacing-lg);
        }

        h1 {
            font-size: var(--font-size-2xl);
            font-weight: var(--font-weight-normal);
            letter-spacing: var(--letter-spacing-tight);
            color: var(--color-neutral-800);
            margin-bottom: var(--spacing-xs);
        }

        .subtitle {
            font-size: var(--font-size-sm);
            color: var(--text-secondary);
            letter-spacing: var(--letter-spacing-wide);
        }

        /* Category Navigation */
        #category-nav {
            display: flex;
            gap: var(--spacing-sm);
            justify-content: center;
            margin-bottom: var(--spacing-2xl);
            flex-wrap: wrap;
        }

        .category-btn {
            padding: var(--spacing-sm) var(--spacing-md);
            border: 1px solid var(--border-medium);
            background: var(--bg-card);
            backdrop-filter: var(--blur-card);
            -webkit-backdrop-filter: var(--blur-card);
            border-radius: var(--radius-full);
            cursor: pointer;
            font-family: var(--font-sans);
            font-size: var(--font-size-xs);
            color: var(--text-secondary);
            letter-spacing: var(--letter-spacing-wide);
            transition: all var(--transition-fast);
        }

        .category-btn:hover {
            border-color: var(--color-accent-terracotta);
            color: var(--color-accent-terracotta);
        }

        .category-btn.active {
            background: var(--color-accent-terracotta);
            color: white;
            border-color: var(--color-accent-terracotta);
        }

        /* Main Content */
        main {
            flex: 1;
        }

        /* Duel Section */
        #progress-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-md);
            padding: 0 var(--spacing-sm);
        }

        #duel-counter {
            font-size: var(--font-size-xs);
            color: var(--text-muted);
            letter-spacing: var(--letter-spacing-wide);
            font-weight: var(--font-weight-medium);
        }

        #ranking-link a {
            color: var(--color-accent-terracotta);
            text-decoration: none;
            font-size: var(--font-size-xs);
            letter-spacing: var(--letter-spacing-wide);
            transition: color var(--transition-fast);
        }

        #ranking-link a:hover {
            color: var(--color-accent-ochre);
        }

        #duel-container {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-xl);
        }

        .font-card {
            background: var(--bg-card);
            backdrop-filter: var(--blur-card);
            -webkit-backdrop-filter: var(--blur-card);
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-card);
            border-radius: var(--radius-sm);
            overflow: hidden;
            transition: all var(--transition-normal);
            position: relative;
            border: 2px solid transparent;
        }

        .font-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px -10px rgba(81, 70, 62, 0.2), 
                        0 2px 6px rgba(81, 70, 62, 0.08);
        }

        .font-card:active {
            transform: scale(0.99);
        }

        .font-card.winner {
            border-color: var(--color-accent-terracotta);
        }

        .preview-area {
            padding: var(--spacing-xl);
            min-height: 280px;
            display: flex;
            flex-direction: column;
            gap: var(--spacing-sm);
            background: var(--color-neutral-50);
            cursor: pointer;
            transition: background var(--transition-fast);
        }

        .preview-area:hover {
            background: var(--color-neutral-100);
        }

        .preview-heading {
            font-size: var(--font-size-lg);
            font-weight: var(--font-weight-bold);
            line-height: var(--line-height-tight);
            color: var(--text-primary);
        }

        .preview-subheading {
            font-size: var(--font-size-md);
            font-weight: var(--font-weight-medium);
            line-height: var(--line-height-normal);
            color: var(--text-secondary);
        }

        .preview-body {
            font-size: var(--font-size-sm);
            line-height: var(--line-height-relaxed);
            color: var(--text-secondary);
        }

        .preview-mono {
            font-size: var(--font-size-xs);
            background: var(--color-neutral-200);
            padding: var(--spacing-sm);
            border-radius: var(--radius-md);
            font-family: monospace;
            color: var(--text-primary);
        }

        .font-info {
            padding: var(--spacing-md);
            background: rgba(234, 228, 218, 0.5);
            border-top: 1px solid var(--border-medium);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .font-info.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .font-info.revealed {
            opacity: 1;
            animation: fadeIn var(--transition-normal);
        }

        .font-name {
            font-weight: var(--font-weight-medium);
            font-size: var(--font-size-sm);
            color: var(--text-primary);
            letter-spacing: var(--letter-spacing-tight);
        }

        .font-rank {
            font-size: var(--font-size-xs);
            color: var(--text-muted);
            background: rgba(184, 172, 157, 0.3);
            padding: var(--spacing-xs) var(--spacing-sm);
            border-radius: var(--radius-full);
        }

        .reveal-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 56px;
            background: linear-gradient(to top, rgba(234, 228, 218, 0.98), rgba(234, 228, 218, 0.9));
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all var(--transition-fast);
            border-top: 1px solid var(--border-medium);
        }

        .reveal-overlay:hover {
            background: linear-gradient(to top, rgba(243, 239, 234, 1), rgba(234, 228, 218, 0.95));
        }

        .reveal-overlay.hidden {
            display: none;
        }

        .reveal-text {
            font-size: var(--font-size-xs);
            color: var(--text-secondary);
            font-weight: var(--font-weight-medium);
            letter-spacing: var(--letter-spacing-wide);
        }

        .swipe-hint {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: var(--font-size-xs);
            font-weight: var(--font-weight-medium);
            color: var(--text-muted);
            opacity: 0;
            transition: opacity var(--transition-fast);
            pointer-events: none;
            background: rgba(250, 248, 245, 0.9);
            padding: var(--spacing-xs) var(--spacing-sm);
            border-radius: var(--radius-md);
            letter-spacing: var(--letter-spacing-wide);
        }

        .font-card:hover .swipe-hint {
            opacity: 1;
        }

        .swipe-left {
            left: var(--spacing-sm);
        }

        .swipe-right {
            right: var(--spacing-sm);
        }

        #vs-divider {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: var(--font-size-xs);
            font-weight: var(--font-weight-bold);
            color: var(--text-muted);
            writing-mode: vertical-rl;
            text-orientation: mixed;
            letter-spacing: var(--letter-spacing-wide);
        }

        /* Controls */
        #controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: var(--spacing-md);
            flex-wrap: wrap;
        }

        .control-btn {
            padding: var(--spacing-sm) var(--spacing-md);
            border-radius: var(--radius-full);
            border: none;
            cursor: pointer;
            font-family: var(--font-sans);
            font-size: var(--font-size-xs);
            font-weight: var(--font-weight-medium);
            letter-spacing: var(--letter-spacing-wide);
            transition: all var(--transition-fast);
        }

        .control-btn.primary {
            background: var(--color-accent-terracotta);
            color: white;
        }

        .control-btn.secondary {
            background: var(--bg-card);
            backdrop-filter: var(--blur-card);
            -webkit-backdrop-filter: var(--blur-card);
            border: 1px solid var(--border-medium);
            color: var(--text-secondary);
        }

        .control-btn:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow-card);
        }

        .control-btn:active {
            transform: scale(0.98);
        }

        #keyboard-hint {
            font-size: var(--font-size-xs);
            color: var(--text-muted);
            background: transparent;
            border: none;
            cursor: default;
            font-family: var(--font-sans);
            letter-spacing: var(--letter-spacing-wide);
        }

        /* Rankings Section */
        #rankings-section.hidden {
            display: none;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-lg);
        }

        .section-header h2 {
            font-size: var(--font-size-xl);
            font-weight: var(--font-weight-normal);
            color: var(--color-neutral-800);
            letter-spacing: var(--letter-spacing-tight);
        }

        .section-header a {
            color: var(--color-accent-terracotta);
            text-decoration: none;
            font-size: var(--font-size-sm);
            letter-spacing: var(--letter-spacing-wide);
            transition: color var(--transition-fast);
        }

        .section-header a:hover {
            color: var(--color-accent-ochre);
        }

        #rankings-list {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-xs);
        }

        .ranking-item {
            display: grid;
            grid-template-columns: 3rem 1fr 4rem 3rem;
            gap: var(--spacing-md);
            align-items: center;
            padding: var(--spacing-sm) var(--spacing-md);
            background: var(--bg-card);
            backdrop-filter: var(--blur-card);
            -webkit-backdrop-filter: var(--blur-card);
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-card);
            border-radius: var(--radius-sm);
        }

        .ranking-rank {
            font-weight: var(--font-weight-bold);
            color: var(--color-accent-terracotta);
            font-size: var(--font-size-md);
            text-align: center;
        }

        .ranking-font {
            font-weight: var(--font-weight-medium);
            color: var(--text-primary);
            font-size: var(--font-size-sm);
        }

        .ranking-score {
            text-align: right;
            color: var(--text-secondary);
            font-size: var(--font-size-xs);
            font-variant-numeric: tabular-nums;
        }

        .ranking-wins {
            text-align: right;
            font-size: var(--font-size-xs);
            color: var(--text-muted);
        }

        /* Footer */
        footer {
            margin-top: var(--spacing-2xl);
            padding-top: var(--spacing-xl);
            border-top: 1px solid var(--border-medium);
            display: flex;
            gap: var(--spacing-md);
            justify-content: center;
            flex-wrap: wrap;
        }

        .footer-btn {
            padding: var(--spacing-sm) var(--spacing-md);
            background: var(--bg-card);
            backdrop-filter: var(--blur-card);
            -webkit-backdrop-filter: var(--blur-card);
            border: 1px solid var(--border-medium);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-family: var(--font-sans);
            font-size: var(--font-size-xs);
            color: var(--text-secondary);
            letter-spacing: var(--letter-spacing-wide);
            transition: all var(--transition-fast);
        }

        .footer-btn:hover {
            border-color: var(--color-accent-terracotta);
            color: var(--color-accent-terracotta);
        }

        .footer-btn.danger:hover {
            border-color: var(--color-accent-terracotta);
            color: var(--color-accent-terracotta);
        }

        /* Toast Notifications */
        #toast-container {
            position: fixed;
            bottom: var(--spacing-xl);
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            gap: var(--spacing-sm);
            z-index: 1000;
            pointer-events: none;
        }

        .toast {
            background: var(--color-neutral-900);
            color: var(--color-neutral-50);
            padding: var(--spacing-sm) var(--spacing-md);
            border-radius: var(--radius-md);
            font-size: var(--font-size-xs);
            letter-spacing: var(--letter-spacing-wide);
            animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s;
            pointer-events: auto;
            box-shadow: var(--shadow-card);
        }

        @keyframes toastIn {
            from { opacity: 0; transform: translateY(1rem); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes toastOut {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-1rem); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .font-card {
            animation: fadeIn var(--transition-normal);
        }

        /* Responsive */
        @media (max-width: 768px) {
            #app {
                padding: var(--spacing-md);
            }

            h1 {
                font-size: var(--font-size-xl);
            }

            #duel-container {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr auto 1fr;
            }

            #vs-divider {
                writing-mode: horizontal-tb;
                padding: var(--spacing-sm);
            }

            .preview-area {
                min-height: 200px;
                padding: var(--spacing-lg);
            }

            .ranking-item {
                grid-template-columns: 2.5rem 1fr 3.5rem;
            }

            .ranking-wins {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <header>
            <h1>Font Duel</h1>
            <p class="subtitle">Find your favorite font through battle</p>
        </header>

        <nav id="category-nav">
            <button class="category-btn active" data-category="sans-serif">Sans-Serif</button>
            <button class="category-btn" data-category="serif">Serif</button>
            <button class="category-btn" data-category="mono">Monospace</button>
            <button class="category-btn" data-category="all">All Fonts</button>
        </nav>

        <main>
            <section id="duel-section">
                <div id="progress-container">
                    <span id="duel-counter">Battle 1</span>
                    <div id="ranking-link"><a href="#" id="view-rankings">View Rankings</a></div>
                </div>

                <div id="duel-container">
                    <div class="font-card" id="left-card">
                        <div class="preview-area" id="left-preview"></div>
                        <div class="font-info hidden">
                            <span class="font-name" id="left-name">Font A</span>
                            <span class="font-rank" id="left-rank">Rank: --</span>
                        </div>
                        <div class="reveal-overlay" data-side="left">
                            <span class="reveal-text">Click to reveal</span>
                        </div>
                        <div class="swipe-hint swipe-left">← Skip</div>
                    </div>

                    <div id="vs-divider">VS</div>

                    <div class="font-card" id="right-card">
                        <div class="preview-area" id="right-preview"></div>
                        <div class="font-info hidden">
                            <span class="font-name" id="right-name">Font B</span>
                            <span class="font-rank" id="right-rank">Rank: --</span>
                        </div>
                        <div class="reveal-overlay" data-side="right">
                            <span class="reveal-text">Click to reveal</span>
                        </div>
                        <div class="swipe-hint swipe-right">Winner →</div>
                    </div>
                </div>

                <div id="controls">
                    <button id="skip-btn" class="control-btn secondary">Skip Both</button>
                    <button id="draw-btn" class="control-btn secondary">Draw</button>
                    <button id="keyboard-hint">⌨️ J = Left, K = Draw, L = Right</button>
                </div>
            </section>

            <section id="rankings-section" class="hidden">
                <div class="section-header">
                    <h2>Your Font Rankings</h2>
                    <a href="#" id="back-to-duel">← Back to Duel</a>
                </div>
                <div id="rankings-list"></div>
            </section>
        </main>

        <footer>
            <button id="export-btn" class="footer-btn">Export Data</button>
            <label for="import-input" class="footer-btn">Import Data</label>
            <input type="file" id="import-input" accept=".json" hidden>
            <button id="reset-btn" class="footer-btn danger">Reset All</button>
        </footer>
    </div>

    <div id="toast-container"></div>

    <script src="app.js"></script>
</body>
</html>
